project:
  name: MM-SearchLab
  seed: 42

paths:
  catalog: data/raw/catalog.jsonl
  image_dir: data/raw/images
  processed_dir: data/processed
  embedding_dir: artifacts/embeddings
  index_dir: artifacts/index
  report_dir: reports/baseline

model:
  name: ViT-B-32
  pretrained: openai
  device: cpu
  batch_size: 8

retrieval:
  top_k: 5
  normalize_embeddings: true
  index_metric: inner_product

toy_data:
  num_items: 12
  image_size: 224
